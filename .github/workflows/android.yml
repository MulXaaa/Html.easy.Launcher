name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21 # 关键修复：升级到 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli@latest
          npm install --force

      - name: Build Android Project
        run: |
          mkdir -p www
          rm -rf android
          npx cap add android
          npx cap sync

      - name: Build Android Project
        run: |
          mkdir -p www
          rm -rf android
          npx cap add android
          npx cap sync
          # --- 核心手术：强制注入文件读取权限 ---
          sed -i '/<application/i <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: launcher-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
