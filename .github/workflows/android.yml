name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04  # 使用更稳定的 Ubuntu 版本
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 直接用最新的稳定版

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/android @capacitor/core @capacitor/cli @capacitor/filesystem @capacitor/device @capacitor/app @capacitor/camera

      - name: Add and Sync Android
        run: |
          # 如果目录已存在则删除，防止冲突
          rm -rf android
          npx cap add android
          npx cap sync

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: launcher-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
